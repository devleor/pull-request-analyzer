version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: pr-analyzer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: pr-analyzer-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy

  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: pr-analyzer-phoenix
    restart: unless-stopped
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /phoenix
    volumes:
      - phoenix_data:/phoenix
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6006/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  redis_data:
  phoenix_data:
